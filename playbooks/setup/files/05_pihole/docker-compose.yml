services:
    pihole:
        container_name: pihole
        image: pihole/pihole:2026.04.0
        ports:
            - "53:53/tcp"
            - "53:53/udp"
            - "8080:80/tcp"
        env_file:
            - .env
        volumes:
            - pihole_data:/etc/pihole
            - dnsmasq_data:/etc/dnsmasq.d
        restart: unless-stopped
volumes:
    pihole_data:
    dnsmasq_data:
